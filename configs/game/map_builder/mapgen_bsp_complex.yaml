_target_: mettagrid.map.mapgen.MapGen

width: 100
height: 120

root:
  _target_: mettagrid.map.scenes.bsp.BSP
  rooms: 20
  min_room_size: 3
  min_room_size_ratio: 0.5
  max_room_size_ratio: 0.9

  children:
    - limit: 1
      lock: lock1
      scene:
        _target_: mettagrid.map.scenes.random.Random
        objects:
          generator: 3
          altar: 3

    - limit: 3
      lock: lock1
      scene:
        _target_: mettagrid.map.scenes.random.Random
        agents: 2

    - limit: 2
      lock: lock1
      scene:
        _target_: mettagrid.map.scenes.maze.MazeKruskal
        extra_space_empty: true
        # TODO - extra_space_empty is not enough, entrypoint can still be blocked because the corridor is attached randomly
        # Should the maze scene accept an entrypoint somehow?
