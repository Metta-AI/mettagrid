name: Benchmark
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Prevent hung jobs from consuming resources
    permissions:
      checks: write # For GitHub Checks comments
      pull-requests: write # For PR comments
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.7"

      # Cache pip packages
      - name: Cache pip packages
        uses: actions/cache@v4
        id: cache-pip
        with:
          path: |
            ~/.cache/pip
            venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies (only if cache miss)
      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-benchmark

      # Cache PufferLib dependency
      - name: Cache PufferLib
        uses: actions/cache@v4
        id: cache-pufferlib
        with:
          path: ../pufferlib
          key: ${{ runner.os }}-pufferlib-metta-${{ hashFiles('.github/workflows/benchmark.yml') }}

      # Install PufferLib (only if cache miss)
      - name: Install PufferLib
        if: steps.cache-pufferlib.outputs.cache-hit != 'true'
        run: |
          source venv/bin/activate
          cd ..
          git clone --depth=1 --branch=metta https://github.com/Metta-AI/pufferlib.git
          cd pufferlib
          pip install -e .

      # Always run build_ext since it's quick and needs to be done after checkout
      - name: Run setup.py build_ext
        run: |
          source venv/bin/activate
          python setup.py build_ext --inplace

      # Run benchmarks
      - name: Run benchmarks
        env:
          HYDRA_FULL_ERROR: 1
          PYTHONPATH: ${{ github.workspace }}
        run: |
          source venv/bin/activate
          pytest tests --benchmark-json=./benchmark_results.json

      # Install Bencher CLI using the GitHub Action
      - uses: bencherdev/bencher@main

      # For pushes to main branch
      - name: Upload to Bencher (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          bencher run \
            --project mettagrid \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --branch main \
            --testbed ubuntu-latest \
            --adapter json \
            --github-actions '${{ secrets.GITHUB_TOKEN }}' \
            --err \
            --file ./benchmark_results.json

      # For pull requests
      - name: Upload to Bencher (PR branch)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          bencher run \
            --project mettagrid \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --branch "$GITHUB_HEAD_REF" \
            --start-point "$GITHUB_BASE_REF" \
            --start-point-hash '${{ github.event.pull_request.base.sha }}' \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --err \
            --adapter json \
            --github-actions '${{ secrets.GITHUB_TOKEN }}' \
            --file ./benchmark_results.json
