name: Benchmark
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Prevent hung jobs from consuming resources
    permissions:
      checks: write # For GitHub Checks comments
      pull-requests: write # For PR comments
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.7"

      # Cache pip packages
      - name: Cache pip packages
        uses: actions/cache@v4
        id: cache-pip
        with:
          path: |
            ~/.cache/pip
            venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies (including PufferLib from requirements.txt)
      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Always run build_ext since it's quick and needs to be done after checkout
      - name: Run setup.py build_ext
        run: |
          source venv/bin/activate
          python setup.py build_ext --inplace

      # Run benchmarks
      - name: Run benchmarks
        env:
          HYDRA_FULL_ERROR: 1
          PYTHONPATH: ${{ github.workspace }}
        run: |
          source venv/bin/activate
          pytest tests --benchmark-json=./benchmark_results.json

      # Install Bencher CLI using the GitHub Action
      - uses: bencherdev/bencher@main

      - name: Validate Bencher Token
        run: |
          if bencher project list --token ${{ secrets.BENCHER_API_TOKEN }} > /dev/null; then
            echo "Bencher token is valid"
          else
            echo "Bencher token validation failed"
            exit 1
          fi

      # For pushes to main branch
      - name: Upload to Bencher (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Try initializing the branch first if it doesn't exist
          bencher project branch create \
            --project mettagrid-sv3f5i2k \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --name main || true

          bencher run \
            --project mettagrid-sv3f5i2k \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --branch main \
            --testbed ubuntu-latest \
            --adapter python_pytest \
            --github-actions '${{ secrets.GITHUB_TOKEN }}' \
            --file ./benchmark_results.json > /dev/null

      # For pull requests
      - name: Upload to Bencher (PR branch)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          # Try initializing the branch first if it doesn't exist
          bencher project branch create \
            --project mettagrid-sv3f5i2k \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --name "$GITHUB_HEAD_REF" || true

          bencher run \
            --project mettagrid-sv3f5i2k \
            --token '${{ secrets.BENCHER_API_TOKEN }}' \
            --branch "$GITHUB_HEAD_REF" \
            --start-point "$GITHUB_BASE_REF" \
            --start-point-hash '${{ github.event.pull_request.base.sha }}' \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --adapter python_pytest \
            --github-actions '${{ secrets.GITHUB_TOKEN }}' \
            --file ./benchmark_results.json > /dev/null
